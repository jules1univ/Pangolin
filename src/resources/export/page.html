<!DOCTYPE html>
<html lang="{{LANG}}">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>{{TITLE}}</title>
    <meta name="robots" content="index, follow" />

    <meta property="og:title" content="{{TITLE}}" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{TITLE}}" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Source+Code+Pro:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --page-bg: #f4f0e8;
            --card-bg: #fffaf2;
            --text: #1f1b16;
            --muted: #5c5348;
            --accent: #c56b3d;
            --accent-2: #2f6f7b;
            --border: rgba(55, 45, 35, 0.2);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
            --rule-color: rgba(55, 45, 35, 0.35);
            --counter-color: #c56b3d;
            --section-num-opacity: 0.45;
        }

        .theme-ink {
            --page-bg: #eef1f4;
            --card-bg: #ffffff;
            --text: #1b1f27;
            --muted: #4b5563;
            --accent: #4b5563;
            --accent-2: #2563eb;
            --border: rgba(31, 41, 55, 0.18);
            --shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
            --rule-color: rgba(31, 41, 55, 0.28);
            --counter-color: #2563eb;
        }

        .theme-sage {
            --page-bg: #edf4ee;
            --card-bg: #f8fbf7;
            --text: #17211c;
            --muted: #3f5a4a;
            --accent: #3f7d5a;
            --accent-2: #2a5c7c;
            --border: rgba(23, 33, 28, 0.18);
            --shadow: 0 20px 50px rgba(23, 33, 28, 0.12);
            --rule-color: rgba(23, 33, 28, 0.28);
            --counter-color: #3f7d5a;
        }

        .theme-ember {
            --page-bg: #f6ece6;
            --card-bg: #fff6f0;
            --text: #2c1b14;
            --muted: #6b4a3d;
            --accent: #d65f3e;
            --accent-2: #8a3c2b;
            --border: rgba(68, 38, 29, 0.18);
            --shadow: 0 20px 45px rgba(68, 38, 29, 0.14);
            --rule-color: rgba(68, 38, 29, 0.28);
            --counter-color: #d65f3e;
        }

        .theme-harbor {
            --page-bg: #e9f1f8;
            --card-bg: #f6faff;
            --text: #13202b;
            --muted: #395264;
            --accent: #3a6ea5;
            --accent-2: #2c8aa5;
            --border: rgba(19, 32, 43, 0.18);
            --shadow: 0 20px 50px rgba(19, 32, 43, 0.12);
            --rule-color: rgba(19, 32, 43, 0.28);
            --counter-color: #3a6ea5;
        }

        .theme-sandstone {
            --page-bg: #f2eee6;
            --card-bg: #fffaf2;
            --text: #2a2416;
            --muted: #6c5f44;
            --accent: #b37a3b;
            --accent-2: #6b5a3a;
            --border: rgba(42, 36, 22, 0.18);
            --shadow: 0 20px 45px rgba(42, 36, 22, 0.12);
            --rule-color: rgba(42, 36, 22, 0.28);
            --counter-color: #b37a3b;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--page-bg);
            color: var(--text);
            font-family: "EB Garamond", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
            font-size: 17px;
            line-height: 1.75;
            -webkit-font-smoothing: antialiased;
        }

        .page {
            max-width: 860px;
            margin: 52px auto;
            padding: 72px 80px 80px;
            background: var(--card-bg);
            border-radius: 4px;
            box-shadow: var(--shadow);
            counter-reset: section-counter figure-counter table-counter;
        }

        .header {
            text-align: center;
            padding-bottom: 36px;
            border-bottom: 2px solid var(--rule-color);
            margin-bottom: 40px;
        }

        .header h1 {
            margin: 0 0 18px 0;
            font-family: "Libre Baskerville", "Times New Roman", Times, serif;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 0.01em;
            line-height: 1.35;
            text-transform: uppercase;
        }

        .header .sub {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-family: "Source Code Pro", "Courier New", monospace;
            margin-top: 10px;
        }

        .header-meta {
            display: flex;
            justify-content: center;
            gap: 32px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .header-meta-item {
            font-size: 13px;
            color: var(--muted);
            font-family: "Source Code Pro", "Courier New", monospace;
            letter-spacing: 0.04em;
        }

        .header-meta-item strong {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent);
            margin-bottom: 2px;
        }

        .content {
            display: grid;
            gap: 0;
        }

        .nb-block {
            position: relative;
            padding: 0 0 28px 0;
            margin-bottom: 4px;
        }

        .nb-block+.nb-block {
            padding-top: 28px;
            border-top: 1px solid var(--border);
        }

        .nb-block::before {
            display: none;
        }

        .nb-text p {
            margin: 0 0 1em 0;
            font-size: 17px;
            text-align: justify;
            hyphens: auto;
        }

        .nb-text p:last-child {
            margin-bottom: 0;
        }

        .nb-text h2 {
            font-family: "Libre Baskerville", serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text);
            margin: 0 0 16px 0;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            counter-increment: section-counter;
        }

        .nb-text h2::before {
            content: counter(section-counter, upper-roman) ". ";
            color: var(--accent);
            opacity: var(--section-num-opacity);
            font-family: "Source Code Pro", monospace;
            font-size: 12px;
        }

        .nb-text h3 {
            font-family: "EB Garamond", serif;
            font-size: 17px;
            font-weight: 600;
            font-style: italic;
            margin: 0 0 12px 0;
            color: var(--text);
        }

        .nb-text blockquote {
            margin: 20px 0;
            padding: 14px 22px;
            border-left: 3px solid var(--accent);
            background: rgba(0, 0, 0, 0.025);
            border-radius: 0 3px 3px 0;
            font-style: italic;
            color: var(--muted);
        }

        .nb-text blockquote p {
            margin: 0;
        }

        .nb-text code {
            font-family: "Source Code Pro", "Courier New", monospace;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.06);
            padding: 1px 5px;
            border-radius: 3px;
        }

        .nb-text pre {
            background: rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 18px 20px;
            overflow-x: auto;
        }

        .nb-text pre code {
            background: none;
            padding: 0;
            font-size: 13px;
            line-height: 1.6;
        }

        .nb-text ol,
        .nb-text ul {
            margin: 0 0 1em 0;
            padding-left: 1.6em;
        }

        .nb-text li {
            margin-bottom: 0.35em;
        }

        .nb-text table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
            margin: 16px 0;
        }

        .nb-text table caption {
            font-size: 13px;
            font-style: italic;
            color: var(--muted);
            text-align: center;
            margin-bottom: 8px;
            counter-increment: table-counter;
        }

        .nb-text table caption::before {
            content: "Table " counter(table-counter) ". ";
            font-style: normal;
            font-family: "Source Code Pro", monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
        }

        .nb-text th {
            font-family: "Source Code Pro", monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 500;
            padding: 8px 12px;
            border-bottom: 2px solid var(--rule-color);
            text-align: left;
            color: var(--muted);
        }

        .nb-text td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        .nb-text tr:last-child td {
            border-bottom: none;
        }

        .nb-image,
        .nb-chart {
            text-align: center;
        }

        .nb-image img,
        .nb-chart img,
        .nb-chart svg {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 3px;
            border: 1px solid var(--border);
        }

        .nb-image figcaption,
        .nb-chart figcaption {
            margin-top: 10px;
            font-size: 13px;
            font-style: italic;
            color: var(--muted);
            counter-increment: figure-counter;
        }

        .nb-image figcaption::before,
        .nb-chart figcaption::before {
            content: "Fig. " counter(figure-counter) " — ";
            font-style: normal;
            font-family: "Source Code Pro", monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
        }

        .nb-warning {
            background: rgba(241, 196, 107, 0.12);
            border: 1px solid rgba(241, 196, 107, 0.5);
            border-radius: 3px;
            padding: 16px 20px;
            color: #7a5a10;
            font-size: 14px;
            font-family: "Source Code Pro", monospace;
            letter-spacing: 0.02em;
        }

        .nb-warning::before {
            content: "WARNING  ";
            font-weight: 600;
            color: #b5850f;
            letter-spacing: 0.12em;
        }

        .nb-empty {
            text-align: center;
            color: var(--muted);
            font-style: italic;
            font-size: 15px;
            padding: 32px 0;
        }

        .nb-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 4px 0;
        }

        .page-footer {
            margin-top: 52px;
            padding-top: 20px;
            border-top: 2px solid var(--rule-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: "Source Code Pro", monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
        }

        @media (max-width: 720px) {
            .page {
                margin: 12px;
                padding: 36px 28px 44px;
            }

            .header h1 {
                font-size: 20px;
            }

            .header-meta {
                gap: 20px;
            }

            .nb-text p {
                text-align: left;
                hyphens: none;
            }
        }

        @media print {
            body {
                background: #ffffff;
                font-size: 11pt;
            }

            .page {
                margin: 0;
                border-radius: 0;
                box-shadow: none;
                padding: 2cm 2.5cm;
            }

            .nb-block+.nb-block {
                break-inside: avoid;
            }
        }
    </style>
</head>

<body class="{{THEME_CLASS}}">
    <div class="page">
        {{HEADER}}
        <main class="content">
            {{BODY}}
        </main>
        <footer class="page-footer">
            <span>{{TITLE}}</span>
            <span>{{DATE}}</span>
        </footer>
    </div>
</body>

</html>
