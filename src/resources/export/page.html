<!DOCTYPE html>
<html lang="{{LANG}}">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>
    <style>
        :root {
            --page-bg: #f4f0e8;
            --card-bg: #fffaf2;
            --text: #1f1b16;
            --muted: #5c5348;
            --accent: #c56b3d;
            --accent-2: #2f6f7b;
            --border: rgba(55, 45, 35, 0.2);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
        }

        .theme-linen {}

        .theme-ink {
            --page-bg: #eef1f4;
            --card-bg: #ffffff;
            --text: #1b1f27;
            --muted: #4b5563;
            --accent: #4b5563;
            --accent-2: #2563eb;
            --border: rgba(31, 41, 55, 0.18);
            --shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
        }

        .theme-sage {
            --page-bg: #edf4ee;
            --card-bg: #f8fbf7;
            --text: #17211c;
            --muted: #3f5a4a;
            --accent: #3f7d5a;
            --accent-2: #2a5c7c;
            --border: rgba(23, 33, 28, 0.18);
            --shadow: 0 20px 50px rgba(23, 33, 28, 0.12);
        }

        .theme-ember {
            --page-bg: #f6ece6;
            --card-bg: #fff6f0;
            --text: #2c1b14;
            --muted: #6b4a3d;
            --accent: #d65f3e;
            --accent-2: #8a3c2b;
            --border: rgba(68, 38, 29, 0.18);
            --shadow: 0 20px 45px rgba(68, 38, 29, 0.14);
        }

        .theme-harbor {
            --page-bg: #e9f1f8;
            --card-bg: #f6faff;
            --text: #13202b;
            --muted: #395264;
            --accent: #3a6ea5;
            --accent-2: #2c8aa5;
            --border: rgba(19, 32, 43, 0.18);
            --shadow: 0 20px 50px rgba(19, 32, 43, 0.12);
        }

        .theme-sandstone {
            --page-bg: #f2eee6;
            --card-bg: #fffaf2;
            --text: #2a2416;
            --muted: #6c5f44;
            --accent: #b37a3b;
            --accent-2: #6b5a3a;
            --border: rgba(42, 36, 22, 0.18);
            --shadow: 0 20px 45px rgba(42, 36, 22, 0.12);
        }

        body {
            margin: 0;
            background: var(--page-bg);
            color: var(--text);
            font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
            line-height: 1.6;
        }

        .page {
            max-width: 960px;
            margin: 48px auto;
            padding: 44px 52px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .header {
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            margin: 0 0 6px 0;
            font-family: "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
            font-size: 32px;
            letter-spacing: 0.02em;
        }

        .header .sub {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.14em;
        }

        .content {
            margin-top: 24px;
            display: grid;
            gap: 18px;
        }

        .nb-block {
            position: relative;
            padding: 18px 22px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--border);
        }

        .nb-block::before {
            content: "";
            position: absolute;
            left: -1px;
            top: 16px;
            bottom: 16px;
            width: 4px;
            border-radius: 4px;
            background: linear-gradient(180deg, var(--accent), var(--accent-2));
        }

        .nb-text p {
            margin: 0;
            font-size: 17px;
        }

        .nb-image img,
        .nb-chart img,
        .nb-chart svg {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 10px;
        }

        .nb-warning {
            background: #fff3cd;
            border-color: #f1c46b;
            color: #7a5a10;
        }

        .nb-empty {
            text-align: center;
            color: var(--muted);
            font-style: italic;
        }

        @media (max-width: 720px) {
            .page {
                margin: 20px;
                padding: 28px;
            }

            .header h1 {
                font-size: 26px;
            }
        }

        @media print {
            body {
                background: #ffffff;
            }

            .page {
                margin: 0;
                border-radius: 0;
                box-shadow: none;
            }
        }
    </style>
</head>

<body class="{{THEME_CLASS}}">
    <div class="page">
        {{HEADER}}
        <main class="content">
            {{BODY}}
        </main>
    </div>
</body>

</html>
