name: Build Native
on:
  push:
    branches: [main]
jobs:
   build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
 
      - name: Build shaded JAR
        run: mvn -B clean package -DskipTests -U
 
      - name: Prepare staging directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item target\Pangol1-1.0-SNAPSHOT.jar staging\
 
      - name: Download JavaFX jmods for Windows
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://download2.gluonhq.com/openjfx/21.0.3/openjfx-21.0.3_windows-x64_bin-jmods.zip" -OutFile "javafx-jmods.zip"
          Expand-Archive -Path "javafx-jmods.zip" -DestinationPath "javafx-jmods"
 
      - name: Detect required modules
        shell: pwsh
        run: |
          $rawOutput = & jdeps `
            --class-path staging\Pangol1-1.0-SNAPSHOT.jar `
            --multi-release 21 `
            --ignore-missing-deps `
            --print-module-deps `
            staging\Pangol1-1.0-SNAPSHOT.jar 2>$null
          $detected = ($rawOutput -split "`n" `
            | Where-Object { $_ -notmatch '^Warning:' -and $_.Trim() -ne '' } `
            | Select-Object -Last 1).Trim()
          $baseModules = "javafx.controls,javafx.web,javafx.swing,javafx.fxml,java.desktop,java.logging,java.naming,java.sql,java.xml,jdk.unsupported"
          if ($detected -ne "") {
            $allModules = "$baseModules,$detected"
          } else {
            $allModules = $baseModules
          }
          echo "JPACKAGE_MODULES=$allModules" >> $env:GITHUB_ENV
 
      - name: Create native installer (Windows msi)
        shell: pwsh
        run: |
          jpackage `
            --input staging `
            --main-jar Pangol1-1.0-SNAPSHOT.jar `
            --main-class fr.univrennes.istic.l2gen.application.Pangol1 `
            --name Pangol1 `
            --app-version 1.0.0 `
            --icon src/resources/icons/logo.ico `
            --type msi `
            --dest dist `
            --module-path javafx-jmods/javafx-jmods-21.0.3 `
            --add-modules $env:JPACKAGE_MODULES `
            --java-options "--add-opens=java.base/java.nio=ALL-UNNAMED" `
            --java-options "--add-opens=java.base/sun.nio.ch=ALL-UNNAMED" `
            --java-options "-Djava.library.path=${"$"}APPDIR" `
            --win-menu `
            --win-shortcut
 
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Pangol1-windows
          path: dist/*.msi